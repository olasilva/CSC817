<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>OREN | Premium Inventory System</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #F9F7F2; color: #1A1A1A; overflow-x: hidden; }
        :root {
            --gold-primary: #B58B3C;
            --gold-dark: #9A7532;
            --gold-light: #D4AF6A;
            --gold-glow: rgba(181, 139, 60, 0.12);
            --pure-white: #FFFFFF;
            --off-white: #FEFCF8;
            --border-light: #F0EBE1;
            --text-muted: #6B7280;
            --shadow-sm: 0 12px 30px rgba(0, 0, 0, 0.05);
        }
        .sidebar {
            width: 260px;
            background: var(--pure-white);
            border-right: 1px solid var(--border-light);
            position: fixed;
            left: 0;
            top: 0;
            height: 100vh;
            z-index: 50;
            box-shadow: var(--shadow-sm);
        }
        .logo-area { padding: 1.5rem 1.8rem; border-bottom: 1px solid var(--border-light); }
        .logo-area h1 { font-size: 1.5rem; font-weight: 800; background: linear-gradient(135deg, var(--gold-dark) 0%, var(--gold-primary) 100%); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .nav-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.75rem 1.8rem;
            margin: 0.2rem 1rem;
            border-radius: 12px;
            font-weight: 500;
            color: #4b5563;
            transition: all 0.25s;
            cursor: pointer;
        }
        .nav-item:hover, .nav-item.active { background: var(--gold-glow); color: var(--gold-primary); }
        .main-content { margin-left: 260px; padding: 1.5rem 2rem; min-height: 100vh; background: var(--off-white); }
        .stat-card {
            background: var(--pure-white);
            border-radius: 20px;
            padding: 1.2rem;
            box-shadow: var(--shadow-sm);
            border: 1px solid rgba(181, 139, 60, 0.15);
            transition: all 0.25s;
        }
        .stat-card:hover { transform: translateY(-2px); border-color: var(--gold-light); }
        .product-card {
            background: var(--pure-white);
            border-radius: 16px;
            overflow: hidden;
            transition: all 0.3s;
            border: 1px solid var(--border-light);
            cursor: pointer;
        }
        .product-card:hover { transform: translateY(-3px); box-shadow: 0 15px 30px -10px rgba(0, 0, 0, 0.1); border-color: var(--gold-light); }
        .product-image { width: 100%; height: 140px; object-fit: cover; background: #f5f2ed; }
        .btn-gold-primary {
            background: var(--gold-primary);
            border: none;
            color: white;
            padding: 0.6rem 1.5rem;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.9rem;
        }
        .btn-gold-primary:hover { background: var(--gold-dark); }
        .btn-outline-gold {
            background: transparent;
            border: 1px solid var(--gold-light);
            color: var(--gold-dark);
            border-radius: 40px;
            padding: 0.4rem 1rem;
            font-weight: 500;
            cursor: pointer;
            font-size: 0.8rem;
        }
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 0.2rem 0.6rem;
            border-radius: 100px;
            font-size: 0.65rem;
            font-weight: 700;
        }
        .status-in-stock { background: #E9F7EF; color: #2B6E3C; }
        .status-low { background: #FFF3E0; color: #B76E0E; }
        .status-out { background: #FDECEA; color: #B33A34; }
        .modal-premium {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(5px);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-premium.active { display: flex; }
        .modal-card {
            background: white;
            max-width: 550px;
            width: 90%;
            border-radius: 28px;
            border-top: 5px solid var(--gold-primary);
        }
        .notification-toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: white;
            border-left: 4px solid var(--gold-primary);
            padding: 0.8rem 1.2rem;
            border-radius: 40px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            z-index: 1100;
            font-size: 0.85rem;
            animation: slideUp 0.2s ease;
        }
        @keyframes slideUp {
            from { transform: translateY(30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .search-input {
            padding: 0.6rem 1.2rem;
            border: 1px solid var(--border-light);
            border-radius: 40px;
            width: 260px;
            background: white;
            font-size: 0.85rem;
        }
        .filter-chip {
            background: white;
            border: 1px solid var(--border-light);
            border-radius: 40px;
            padding: 0.4rem 1rem;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .filter-chip:hover, .filter-chip.active { background: var(--gold-primary); color: white; border-color: var(--gold-primary); }
        .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1.5rem; }
        @media (max-width: 1200px) { .grid-4 { grid-template-columns: repeat(3, 1fr); } }
        @media (max-width: 900px) { .grid-4 { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 768px) { .sidebar { width: 80px; } .sidebar .logo-area p, .sidebar .nav-item span:last-child { display: none; } .main-content { margin-left: 80px; } .nav-item { justify-content: center; padding: 0.75rem 0; } }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="logo-area">
        <h1><i class="fas fa-crown"></i> OREN</h1>
        <p>PREMIUM</p>
    </div>
    <div style="margin-top: 1.5rem;">
        <div class="nav-item active" data-page="dashboard"><i class="fas fa-chart-pie"></i> <span>Dashboard</span></div>
        <div class="nav-item" data-page="inventory"><i class="fas fa-boxes"></i> <span>Inventory</span></div>
        <div class="nav-item" data-page="analytics"><i class="fas fa-chart-line"></i> <span>Analytics</span></div>
        <div class="nav-item" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> <span>Exit</span></div>
    </div>
</div>

<div class="main-content">
    <div id="dashboardView">
        <div class="flex justify-between items-center mb-6 flex-wrap gap-3">
            <div>
                <h2 class="text-2xl font-bold">Premium Dashboard</h2>
                <p class="text-gray-500 text-sm mt-1">52 products | 10 categories | Real-time intelligence</p>
            </div>
            <button class="btn-gold-primary" id="globalAddBtn"><i class="fas fa-plus mr-1"></i>Add Product</button>
        </div>

        <div class="flex flex-wrap gap-2 mb-5" id="categoryFilters"></div>

        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6" id="statsGrid"></div>

        <div class="grid-4" id="productsGrid"></div>
    </div>

    <div id="inventoryView" style="display:none;">
        <div class="flex justify-between items-center mb-6 flex-wrap gap-3">
            <h2 class="text-2xl font-bold">Inventory Management</h2>
            <div class="flex gap-2">
                <input type="text" id="searchInventory" class="search-input" placeholder="Search products...">
                <button class="btn-gold-primary" id="inventoryAddBtn"><i class="fas fa-plus"></i> Add</button>
            </div>
        </div>
        <div class="bg-white rounded-xl border border-gray-100 overflow-hidden">
            <div style="overflow-x: auto; max-height: 70vh;">
                <table class="w-full text-sm">
                    <thead class="bg-[#FEFAF3] sticky top-0">
                        <tr><th class="p-3 text-left text-xs uppercase">Image</th><th class="p-3 text-left text-xs uppercase">ID</th><th class="p-3 text-left text-xs uppercase">Product</th><th class="p-3 text-left text-xs uppercase">Category</th><th class="p-3 text-left text-xs uppercase">Stock</th><th class="p-3 text-left text-xs uppercase">Price</th><th class="p-3 text-left text-xs uppercase">Status</th><th class="p-3 text-left text-xs uppercase">Actions</th></tr>
                    </thead>
                    <tbody id="inventoryTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="analyticsView" style="display:none;">
        <div class="bg-white rounded-xl p-5 border border-gray-100">
            <h3 class="text-lg font-bold mb-4">Inventory Analytics</h3>
            <canvas id="analyticsChart" height="250"></canvas>
            <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mt-5">
                <div class="text-center p-3 bg-gray-50 rounded-lg"><span class="text-gray-500 text-xs">Total Value</span><h2 class="text-xl font-bold" id="analyticsTotalValue">$0</h2></div>
                <div class="text-center p-3 bg-gray-50 rounded-lg"><span class="text-gray-500 text-xs">Avg Price</span><h2 class="text-xl font-bold" id="analyticsAvgPrice">$0</h2></div>
                <div class="text-center p-3 bg-gray-50 rounded-lg"><span class="text-gray-500 text-xs">Total Stock</span><h2 class="text-xl font-bold" id="analyticsTotalStock">0</h2></div>
                <div class="text-center p-3 bg-gray-50 rounded-lg"><span class="text-gray-500 text-xs">Categories</span><h2 class="text-xl font-bold" id="analyticsCategoryCount">0</h2></div>
            </div>
        </div>
    </div>
</div>

<div id="productModal" class="modal-premium">
    <div class="modal-card">
        <div class="p-5 border-b border-gray-100 flex justify-between">
            <h2 class="text-lg font-bold" id="modalTitle">Add Product</h2>
            <i class="fas fa-times cursor-pointer text-gray-400" id="closeModalBtn"></i>
        </div>
        <form id="productForm" class="p-5">
            <input type="hidden" id="productId">
            <div class="mb-3"><label class="block text-sm font-semibold mb-1">Product Name</label><input type="text" id="productName" class="w-full p-2.5 border border-gray-200 rounded-lg text-sm" required></div>
            <div class="mb-3"><label class="block text-sm font-semibold mb-1">Category</label>
                <select id="productCategory" class="w-full p-2.5 border border-gray-200 rounded-lg text-sm">
                    <option>Accessories</option><option>Beverages</option><option>Electronics</option><option>Footwear</option><option>Apparel</option>
                    <option>Home & Living</option><option>Beauty & Care</option><option>Sports & Outdoors</option><option>Toys & Games</option><option>Automotive</option>
                </select>
            </div>
            <div class="grid grid-cols-2 gap-3 mb-3"><div><label class="text-sm">Stock</label><input type="number" id="productStock" class="w-full p-2.5 border border-gray-200 rounded-lg text-sm" required></div><div><label class="text-sm">Price ($)</label><input type="number" step="0.01" id="productPrice" class="w-full p-2.5 border border-gray-200 rounded-lg text-sm" required></div></div>
            <div class="mb-4"><label class="text-sm">Image URL</label><input type="text" id="productImage" class="w-full p-2.5 border border-gray-200 rounded-lg text-sm" placeholder="https://images.unsplash.com/..."></div>
            <div class="flex gap-2"><button type="button" class="btn-outline-gold flex-1" id="cancelModalBtn">Cancel</button><button type="submit" class="btn-gold-primary flex-1">Save</button></div>
        </form>
    </div>
</div>

<script>
    if (!localStorage.getItem('stockflow_auth')) window.location.href = 'auth.html';

    const STORAGE_KEY = 'stockflow_premium_products';
    let allProducts = [];
    let currentEditId = null;
    let analyticsChart = null;
    let currentCategoryFilter = 'all';

    // 52 Premium Products across 10 categories with smaller images
    const categories = ['Accessories', 'Beverages', 'Electronics', 'Footwear', 'Apparel', 'Home & Living', 'Beauty & Care', 'Sports & Outdoors', 'Toys & Games', 'Automotive'];
    
    const productNames = {
        'Accessories': ['Leather Wallet', 'Sunglasses', 'Watch Strap', 'Backpack', 'Belt', 'Hat'],
        'Beverages': ['Cold Brew Coffee', 'Green Tea', 'Sparkling Water', 'Orange Juice', 'Energy Drink', 'Coconut Water'],
        'Electronics': ['Wireless Earbuds', 'Power Bank', 'USB Hub', 'Smart Speaker', 'Webcam', 'Keyboard'],
        'Footwear': ['Running Shoes', 'Loafers', 'Sandals', 'Boots', 'Sneakers', 'Slides'],
        'Apparel': ['Cotton T-Shirt', 'Hoodie', 'Jeans', 'Jacket', 'Scarf', 'Sweater'],
        'Home & Living': ['Ceramic Mug', 'Lamp', 'Throw Pillow', 'Wall Art', 'Rug', 'Plant Pot'],
        'Beauty & Care': ['Face Cream', 'Shampoo', 'Perfume', 'Lip Balm', 'Hand Lotion', 'Face Mask'],
        'Sports & Outdoors': ['Yoga Mat', 'Dumbbell', 'Water Bottle', 'Tent', 'Backpack', 'Fitness Tracker'],
        'Toys & Games': ['Chess Set', 'Puzzle', 'Action Figure', 'Board Game', 'Drone', 'LEGO Set'],
        'Automotive': ['Car Charger', 'Air Freshener', 'Floor Mats', 'Dash Cam', 'Tool Kit', 'Seat Cover']
    };

    const images = {
        'Accessories': 'https://images.unsplash.com/photo-1627123424574-724758594e93?w=300',
        'Beverages': 'https://images.unsplash.com/photo-1543364195-bfe6e4932397?w=300',
        'Electronics': 'https://images.unsplash.com/photo-1593642632823-8f785ba67e45?w=300',
        'Footwear': 'https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=300',
        'Apparel': 'https://images.unsplash.com/photo-1523381210434-271e8be1f52b?w=300',
        'Home & Living': 'https://images.unsplash.com/photo-1513506003901-1e6a229e2d15?w=300',
        'Beauty & Care': 'https://images.unsplash.com/photo-1570172619644-dfd03ed5d881?w=300',
        'Sports & Outdoors': 'https://images.unsplash.com/photo-1517836357463-d25dfeac3438?w=300',
        'Toys & Games': 'https://images.unsplash.com/photo-1560518883-ce09059eeffa?w=300',
        'Automotive': 'https://images.unsplash.com/photo-1492144534655-ae79c964c9d7?w=300'
    };

    function generateDefaultProducts() {
        const products = [];
        let idCounter = 1;
        for (let cat of categories) {
            const names = productNames[cat] || ['Standard Product', 'Premium Item', 'Deluxe Edition'];
            for (let i = 0; i < (cat === 'Accessories' || cat === 'Electronics' ? 6 : 5); i++) {
                const nameIdx = i % names.length;
                const stock = Math.floor(Math.random() * 120) + 10;
                const price = Math.floor(Math.random() * 400) + 20 + (Math.random() * 100);
                products.push({
                    id: `${cat.substring(0, 3).toUpperCase()}-${String(idCounter).padStart(3, '0')}`,
                    name: names[nameIdx] + (i > 3 ? ` ${['Pro', 'Elite', 'Premium'][i % 3]}` : ''),
                    category: cat,
                    stock: stock,
                    price: Math.round(price * 100) / 100,
                    image: images[cat] + `?random=${idCounter}`,
                    minStock: 15,
                    createdAt: new Date().toISOString()
                });
                idCounter++;
            }
        }
        // Ensure we have exactly 52-55 products
        while (products.length < 52) {
            const cat = categories[products.length % categories.length];
            products.push({
                id: `GEN-${String(products.length + 1).padStart(3, '0')}`,
                name: `${cat} Premium ${products.length + 1}`,
                category: cat,
                stock: Math.floor(Math.random() * 100) + 5,
                price: Math.round((Math.random() * 300 + 25) * 100) / 100,
                image: images[cat] + `?random=${products.length}`,
                minStock: 10,
                createdAt: new Date().toISOString()
            });
        }
        return products.slice(0, 52);
    }

    function initData() {
        let stored = localStorage.getItem(STORAGE_KEY);
        if (!stored || JSON.parse(stored).length < 50) {
            const defaultProds = generateDefaultProducts();
            localStorage.setItem(STORAGE_KEY, JSON.stringify(defaultProds));
        }
        allProducts = JSON.parse(localStorage.getItem(STORAGE_KEY));
        renderAllViews();
    }

    function saveToLocal() { localStorage.setItem(STORAGE_KEY, JSON.stringify(allProducts)); }
    
    function showToast(msg) {
        let toast = document.createElement('div');
        toast.className = 'notification-toast';
        toast.innerHTML = `<i class="fas fa-check-circle mr-1" style="color:var(--gold-primary)"></i>${msg}`;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2000);
    }

    function getStatus(stock, min = 15) {
        if (stock > min) return 'in-stock';
        if (stock > 0) return 'low';
        return 'out';
    }

    function renderCategoryFilters() {
        const cats = ['all', ...categories];
        const container = document.getElementById('categoryFilters');
        container.innerHTML = cats.map(cat => `
            <button class="filter-chip ${currentCategoryFilter === cat ? 'active' : ''}" data-category="${cat}">${cat === 'all' ? 'All Categories' : cat}</button>
        `).join('');
        document.querySelectorAll('.filter-chip').forEach(btn => {
            btn.addEventListener('click', () => {
                currentCategoryFilter = btn.getAttribute('data-category');
                renderCategoryFilters();
                renderProductsGrid();
            });
        });
    }

    function renderStats() {
        const totalVal = allProducts.reduce((s, p) => s + (p.stock * p.price), 0);
        const lowStock = allProducts.filter(p => p.stock > 0 && p.stock <= (p.minStock || 15)).length;
        const outStock = allProducts.filter(p => p.stock === 0).length;
        document.getElementById('statsGrid').innerHTML = `
            <div class="stat-card"><div class="text-gray-500 text-xs uppercase">Total Products</div><div class="text-2xl font-bold">${allProducts.length}</div></div>
            <div class="stat-card"><div class="text-gray-500 text-xs uppercase">Portfolio Value</div><div class="text-2xl font-bold">$${(totalVal / 1000).toFixed(0)}K</div></div>
            <div class="stat-card"><div class="text-gray-500 text-xs uppercase">Low Stock</div><div class="text-2xl font-bold text-amber-600">${lowStock}</div></div>
            <div class="stat-card"><div class="text-gray-500 text-xs uppercase">Out of Stock</div><div class="text-2xl font-bold text-rose-600">${outStock}</div></div>
        `;
    }

    function renderProductsGrid() {
        const container = document.getElementById('productsGrid');
        let filtered = currentCategoryFilter === 'all' ? allProducts : allProducts.filter(p => p.category === currentCategoryFilter);
        const displayProducts = filtered.slice(0, 48);
        
        container.innerHTML = displayProducts.map(p => {
            const status = getStatus(p.stock, p.minStock || 15);
            return `
                <div class="product-card">
                    <img src="${p.image}" class="product-image" onerror="this.src='https://picsum.photos/300/200?random=${p.id}'">
                    <div class="p-3">
                        <div class="flex justify-between items-start mb-1">
                            <h3 class="font-bold text-sm">${p.name.length > 20 ? p.name.substring(0, 18) + '...' : p.name}</h3>
                            <span class="text-xs text-gray-400">${p.id}</span>
                        </div>
                        <p class="text-gray-500 text-xs mb-2">${p.category}</p>
                        <div class="flex justify-between items-center">
                            <span class="text-base font-bold text-gold-600">$${p.price.toFixed(0)}</span>
                            <span class="status-badge status-${status}">${status === 'in-stock' ? 'In Stock' : (status === 'low' ? 'Low' : 'Out')}</span>
                        </div>
                        <div class="mt-2 flex gap-1">
                            <button class="btn-outline-gold text-xs py-1 px-2 flex-1" onclick='editProductById("${p.id}")'>Edit</button>
                            <button class="btn-outline-gold text-xs py-1 px-2 flex-1 text-red-500" onclick='deleteProductById("${p.id}")'>Delete</button>
                        </div>
                    </div>
                </div>
            `;
        }).join('');
    }

    function renderInventoryTable(searchTerm = '') {
        const tbody = document.getElementById('inventoryTableBody');
        let filtered = allProducts.filter(p => p.name.toLowerCase().includes(searchTerm) || p.id.toLowerCase().includes(searchTerm) || p.category.toLowerCase().includes(searchTerm));
        tbody.innerHTML = filtered.map(p => {
            const status = getStatus(p.stock, p.minStock || 15);
            return `<tr class="border-b border-gray-100 hover:bg-gray-50">
                <td class="p-2"><img src="${p.image}" class="w-10 h-10 rounded-lg object-cover" onerror="this.src='https://picsum.photos/40/40'"></td>
                <td class="p-2 text-xs">${p.id}</td>
                <td class="p-2 text-sm font-medium">${p.name}</td>
                <td class="p-2 text-xs">${p.category}</td>
                <td class="p-2 text-sm">${p.stock}</td>
                <td class="p-2 text-sm">$${p.price.toFixed(0)}</td>
                <td class="p-2"><span class="status-badge status-${status}">${status === 'in-stock' ? 'In Stock' : (status === 'low' ? 'Low' : 'Out')}</span></td>
                <td class="p-2"><button class="text-gold-600 mr-2" onclick='editProductById("${p.id}")'><i class="fas fa-edit text-sm"></i></button><button class="text-red-500" onclick='deleteProductById("${p.id}")'><i class="fas fa-trash text-sm"></i></button></td>
             </tr>`;
        }).join('');
    }

    function updateAnalytics() {
        const catMap = new Map();
        allProducts.forEach(p => { catMap.set(p.category, (catMap.get(p.category) || 0) + p.stock); });
        const totalValue = allProducts.reduce((s, p) => s + (p.stock * p.price), 0);
        const avgPrice = allProducts.reduce((s, p) => s + p.price, 0) / allProducts.length;
        const totalStock = allProducts.reduce((s, p) => s + p.stock, 0);
        document.getElementById('analyticsTotalValue').innerHTML = `$${(totalValue / 1000).toFixed(0)}K`;
        document.getElementById('analyticsAvgPrice').innerHTML = `$${avgPrice.toFixed(0)}`;
        document.getElementById('analyticsTotalStock').innerHTML = totalStock;
        document.getElementById('analyticsCategoryCount').innerHTML = categories.length;
        
        const ctx = document.getElementById('analyticsChart').getContext('2d');
        if (analyticsChart) analyticsChart.destroy();
        analyticsChart = new Chart(ctx, {
            type: 'bar',
            data: { labels: Array.from(catMap.keys()), datasets: [{ label: 'Stock Units', data: Array.from(catMap.values()), backgroundColor: '#D4AF6A', borderRadius: 8 }] },
            options: { responsive: true, maintainAspectRatio: true, plugins: { legend: { position: 'bottom' } } }
        });
    }

    window.editProductById = (id) => {
        const p = allProducts.find(p => p.id === id);
        if (p) {
            currentEditId = id;
            document.getElementById('modalTitle').innerText = 'Edit Product';
            document.getElementById('productId').value = p.id;
            document.getElementById('productName').value = p.name;
            document.getElementById('productCategory').value = p.category;
            document.getElementById('productStock').value = p.stock;
            document.getElementById('productPrice').value = p.price;
            document.getElementById('productImage').value = p.image || '';
            document.getElementById('productModal').classList.add('active');
        }
    };

    window.deleteProductById = (id) => {
        if (confirm('Remove this product?')) {
            allProducts = allProducts.filter(p => p.id !== id);
            saveToLocal();
            renderAllViews();
            showToast('Product removed');
        }
    };

    function saveProductHandler(e) {
        e.preventDefault();
        const product = {
            id: document.getElementById('productId').value || `PRD-${Date.now()}`,
            name: document.getElementById('productName').value,
            category: document.getElementById('productCategory').value,
            stock: parseInt(document.getElementById('productStock').value),
            price: parseFloat(document.getElementById('productPrice').value),
            image: document.getElementById('productImage').value || 'https://picsum.photos/300/200',
            minStock: 15,
            createdAt: new Date().toISOString()
        };
        
        if (currentEditId) {
            const idx = allProducts.findIndex(p => p.id === currentEditId);
            if (idx !== -1) allProducts[idx] = { ...allProducts[idx], ...product };
            showToast('Product updated');
        } else {
            allProducts.push(product);
            showToast('Product added');
        }
        saveToLocal();
        renderAllViews();
        closeModal();
    }

    function openAddModal() {
        currentEditId = null;
        document.getElementById('modalTitle').innerText = 'Add New Product';
        document.getElementById('productForm').reset();
        document.getElementById('productId').value = `PRD-${Date.now()}`;
        document.getElementById('productModal').classList.add('active');
    }

    function closeModal() {
        document.getElementById('productModal').classList.remove('active');
        currentEditId = null;
    }

    function renderAllViews() {
        renderStats();
        renderProductsGrid();
        renderInventoryTable(document.getElementById('searchInventory')?.value || '');
        if (document.getElementById('analyticsView').style.display !== 'none') updateAnalytics();
    }

    function setActiveView(view) {
        document.getElementById('dashboardView').style.display = 'none';
        document.getElementById('inventoryView').style.display = 'none';
        document.getElementById('analyticsView').style.display = 'none';
        if (view === 'dashboard') document.getElementById('dashboardView').style.display = 'block';
        else if (view === 'inventory') document.getElementById('inventoryView').style.display = 'block';
        else if (view === 'analytics') { document.getElementById('analyticsView').style.display = 'block'; updateAnalytics(); }
        
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        const activeNav = Array.from(document.querySelectorAll('.nav-item')).find(n => n.getAttribute('data-page') === view);
        if (activeNav) activeNav.classList.add('active');
    }

    window.addEventListener('load', () => {
        initData();
        renderCategoryFilters();
        document.querySelectorAll('.nav-item[data-page]').forEach(btn => {
            btn.addEventListener('click', () => setActiveView(btn.getAttribute('data-page')));
        });
        document.getElementById('globalAddBtn')?.addEventListener('click', openAddModal);
        document.getElementById('inventoryAddBtn')?.addEventListener('click', openAddModal);
        document.getElementById('productForm').addEventListener('submit', saveProductHandler);
        document.getElementById('closeModalBtn')?.addEventListener('click', closeModal);
        document.getElementById('cancelModalBtn')?.addEventListener('click', closeModal);
        document.getElementById('searchInventory')?.addEventListener('input', (e) => renderInventoryTable(e.target.value));
        document.getElementById('logoutBtn')?.addEventListener('click', () => { localStorage.removeItem('stockflow_auth'); window.location.href = 'auth.html'; });
        setActiveView('dashboard');
    });
</script>
</body>
</html>
